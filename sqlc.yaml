 version: "2"
 sql:
   - engine: "postgresql"
     queries: "internal/adapter/db/queries/"
     schema: "internal/adapter/db/migrations/"
     gen:
       go:
         package: "sqlcgen"
         out: "internal/adapter/db/sqlcgen"
         sql_package: "pgx/v5"
         emit_json_tags: true
         emit_empty_slices: true
         overrides:
           - db_type: "vector"
             go_type: "[]float32"
           - db_type: "tsvector"
             go_type: "string"
           - db_type: "uuid"
             go_type:
               import: "github.com/google/uuid"
               type: "UUID"
           - db_type: "citext"
             go_type: "string"

